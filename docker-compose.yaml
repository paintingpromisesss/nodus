services:
  mihomo:
    image: metacubex/mihomo:v1.19.20
    container_name: mihomo
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "2080:2080"
      - "2081:2081"
      - "8081:8081"
      - "9090:9090"
    volumes:
      - ./mihomo/config.yaml:/root/.config/mihomo/config.yaml:ro
    environment:
      TZ: ${MIHOMO_TZ}
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 2080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  cobalt:
    image: ghcr.io/imputnet/cobalt:11.5
    container_name: cobalt
    restart: unless-stopped
    init: true
    network_mode: "service:mihomo"
    environment:
      API_URL: ${COBALT_API_URL}
      API_PORT: ${COBALT_API_PORT}
      CORS_WILDCARD: ${COBALT_CORS_WILDCARD}
      API_AUTH_REQUIRED: ${COBALT_API_AUTH_REQUIRED}
      FORCE_LOCAL_PROCESSING: ${COBALT_FORCE_LOCAL_PROCESSING}
      DISABLED_SERVICES: ${COBALT_DISABLED_SERVICES}
      DURATION_LIMIT: ${COBALT_DURATION_LIMIT}
      TUNNEL_LIFESPAN: ${COBALT_TUNNEL_LIFESPAN}
      RATELIMIT_WINDOW: ${COBALT_RATELIMIT_WINDOW}
      RATELIMIT_MAX: ${COBALT_RATELIMIT_MAX}
      TUNNEL_RATELIMIT_WINDOW: ${COBALT_TUNNEL_RATELIMIT_WINDOW}
      TUNNEL_RATELIMIT_MAX: ${COBALT_TUNNEL_RATELIMIT_MAX}
      ENABLE_DEPRECATED_YOUTUBE_HLS: ${COBALT_ENABLE_DEPRECATED_YOUTUBE_HLS}
      YOUTUBE_ALLOW_BETTER_AUDIO: ${COBALT_YOUTUBE_ALLOW_BETTER_AUDIO}
    depends_on:
      mihomo:
        condition: service_healthy

  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: telegram-bot-api
    restart: unless-stopped
    network_mode: "service:mihomo"
    environment:
      TELEGRAM_API_ID: ${TG_BOT_API_ID}
      TELEGRAM_API_HASH: ${TG_BOT_API_HASH}
      TELEGRAM_LOCAL: "1"
      TELEGRAM_HTTP_IP_ADDRESS: "0.0.0.0"
      TELEGRAM_HTTP_PORT: "8081"
      TELEGRAM_MAX_WEBHOOK_CONNECTIONS: "100"
      TELEGRAM_VERBOSITY: "1"
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    depends_on:
      mihomo:
        condition: service_healthy

  tg_bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tg_bot
    restart: unless-stopped
    network_mode: "service:mihomo"
    init: true
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./tmp:/app/tmp
    depends_on:
      cobalt:
        condition: service_started
      telegram-bot-api:
        condition: service_started
      mihomo:
        condition: service_healthy

volumes:
  telegram-bot-api-data:
services:
  mihomo:
    image: metacubex/mihomo:v1.19.20
    container_name: mihomo
    restart: unless-stopped
    expose:
      - "2080"
    volumes:
      - ./mihomo/config.yaml:/root/.config/mihomo/config.yaml:ro
      - ./mihomo/providers:/root/.config/mihomo/providers
    environment:
      TZ: ${MIHOMO_TZ}
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 2080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
  cobalt:
    image: ghcr.io/imputnet/cobalt:11.5
    container_name: cobalt
    restart: unless-stopped
    init: true
    ports:
      - "9000:9000"
    environment:
      API_URL: ${COBALT_API_URL}
      API_PORT: ${COBALT_API_PORT}

      HTTP_PROXY: ${COBALT_HTTP_PROXY}
      HTTPS_PROXY: ${COBALT_HTTPS_PROXY}
      NO_PROXY: ${COBALT_NO_PROXY}

      CORS_WILDCARD: ${COBALT_CORS_WILDCARD}
      API_AUTH_REQUIRED: ${COBALT_API_AUTH_REQUIRED}

      FORCE_LOCAL_PROCESSING: ${COBALT_FORCE_LOCAL_PROCESSING}
      DISABLED_SERVICES: ${COBALT_DISABLED_SERVICES}

      DURATION_LIMIT: ${COBALT_DURATION_LIMIT}
      TUNNEL_LIFESPAN: ${COBALT_TUNNEL_LIFESPAN}
      RATELIMIT_WINDOW: ${COBALT_RATELIMIT_WINDOW}
      RATELIMIT_MAX: ${COBALT_RATELIMIT_MAX}
      TUNNEL_RATELIMIT_WINDOW: ${COBALT_TUNNEL_RATELIMIT_WINDOW}
      TUNNEL_RATELIMIT_MAX: ${COBALT_TUNNEL_RATELIMIT_MAX}

      ENABLE_DEPRECATED_YOUTUBE_HLS: ${COBALT_ENABLE_DEPRECATED_YOUTUBE_HLS}
      YOUTUBE_ALLOW_BETTER_AUDIO: ${COBALT_YOUTUBE_ALLOW_BETTER_AUDIO}
      
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:9000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    depends_on:
      mihomo:
        condition: service_healthy
  tg_bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tg_bot
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TG_BOT_TOKEN}
      COBALT_BASE_URL: ${TG_BOT_COBALT_BASE_URL}
      MIHOMO_BASE_URL: ${TG_BOT_MIHOMO_BASE_URL}
      MAX_FILE_BYTES: ${TG_BOT_MAX_FILE_BYTES}
      DB_PATH: ${TG_BOT_DB_PATH}
      TEMP_DIR: ${TG_BOT_TEMP_DIR}
      REQUEST_TIMEOUT: ${TG_BOT_REQUEST_TIMEOUT}
      DOWNLOAD_TIMEOUT: ${TG_BOT_DOWNLOAD_TIMEOUT}
      LOG_LEVEL: ${TG_BOT_LOG_LEVEL}
    volumes:
      - ./data:/app/data
      - ./tmp:/app/tmp
    depends_on:
      cobalt:
        condition: service_healthy

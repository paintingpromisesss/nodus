services:
  mihomo:
    image: metacubex/mihomo:latest
    container_name: mihomo
    restart: unless-stopped
    network_mode: "host"
    volumes:
      - ./mihomo/config.yaml:/root/.config/mihomo/config.yaml:ro
      - ./mihomo/providers:/root/.config/mihomo/providers
    environment:
      TZ: Europe/Moscow
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 2080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
  cobalt:
    image: ghcr.io/imputnet/cobalt:11.5
    container_name: cobalt
    restart: unless-stopped
    init: true
    expose:
      - "9000"
    environment:
      API_URL: "http://cobalt:9000"
      HTTP_PROXY: "http://172.17.0.1:2080"
      HTTPS_PROXY: "http://172.17.0.1:2080"
      NO_PROXY: "localhost,127.0.0.1,::1,cobalt,mihomo,host.docker.internal"
    depends_on:
      mihomo:
        condition: service_healthy
  tg_bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tg_bot
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      COBALT_BASE_URL: ${COBALT_BASE_URL}
      MIHOMO_BASE_URL: ${MIHOMO_BASE_URL}
      MAX_FILE_BYTES: ${MAX_FILE_BYTES}
      DB_PATH: ${DB_PATH}
      TEMP_DIR: ${TEMP_DIR}
      REQUEST_TIMEOUT: ${REQUEST_TIMEOUT}
      DOWNLOAD_TIMEOUT: ${DOWNLOAD_TIMEOUT}
      LOG_LEVEL: ${LOG_LEVEL}
    volumes:
      - ./data:/app/data
      - ./tmp:/app/tmp
    depends_on:
      cobalt:
        condition: service_started

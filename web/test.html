<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nodus Fetch Test</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f5f7;
      --panel: #ffffff;
      --panel-muted: #f0f2f5;
      --border: #d7dce3;
      --text: #17202a;
      --muted: #5a6777;
      --accent: #1666d3;
      --accent-strong: #0d52af;
      --success: #0f8f5f;
      --warning: #9a5a00;
      --danger: #b42318;
      --shadow: 0 10px 30px rgba(23, 32, 42, 0.08);
      --radius: 16px;
      --radius-small: 10px;
      --font: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: linear-gradient(180deg, #eef3fb 0%, var(--bg) 220px);
      color: var(--text);
      font-family: var(--font);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .page {
      width: min(1180px, calc(100% - 32px));
      margin: 24px auto 40px;
    }

    .panel,
    .results-section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .panel {
      padding: 24px;
    }

    .results-section {
      margin-top: 20px;
      padding: 20px;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      line-height: 1.5;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 220px;
      gap: 16px;
      margin-top: 20px;
      align-items: stretch;
    }

    .secondary-toolbar {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-top: 16px;
    }

    .field,
    .toggle-card,
    .control {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field-label {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: var(--muted);
    }

    textarea,
    input[type="text"],
    select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius-small);
      background: #fff;
      color: var(--text);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    textarea {
      min-height: 170px;
      resize: vertical;
      padding: 14px 16px;
      line-height: 1.45;
    }

    input[type="text"] {
      min-height: 44px;
      padding: 10px 12px;
    }

    select {
      min-height: 42px;
      padding: 10px 12px;
    }

    textarea:focus,
    input[type="text"]:focus,
    select:focus,
    button:focus,
    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(22, 102, 211, 0.15);
    }

    .toggle-card {
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--panel-muted);
      justify-content: center;
    }

    .toggle-row {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
    }

    .switch {
      position: relative;
      width: 56px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      cursor: pointer;
    }

    .switch input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .switch-track {
      width: 100%;
      height: 100%;
      background: #b8c1cc;
      border-radius: 999px;
      transition: background-color 0.2s ease;
    }

    .switch-thumb {
      position: absolute;
      top: 4px;
      left: 4px;
      width: 24px;
      height: 24px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.18);
      transition: transform 0.2s ease;
    }

    .switch input:checked + .switch-track {
      background: var(--accent);
    }

    .switch input:checked ~ .switch-thumb {
      transform: translateX(24px);
    }

    .fetch-button,
    .download-button {
      border: 0;
      border-radius: 14px;
      color: #fff;
      cursor: pointer;
      transition: transform 0.15s ease, background-color 0.2s ease, opacity 0.2s ease;
    }

    .fetch-button {
      width: 100%;
      margin-top: 18px;
      padding: 20px 24px;
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-strong) 100%);
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .download-button {
      min-width: 160px;
      padding: 12px 18px;
      background: #1c7d4d;
      font-size: 15px;
      font-weight: 700;
    }

    .fetch-button:hover:not(:disabled),
    .download-button:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    .fetch-button:disabled,
    .download-button:disabled,
    textarea:disabled,
    select:disabled,
    input:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .global-banner {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid transparent;
      line-height: 1.5;
      font-weight: 600;
    }

    .global-banner[data-tone="info"] {
      background: #edf4ff;
      border-color: #bfd7ff;
      color: #194f9e;
    }

    .global-banner[data-tone="success"] {
      background: #ebfbf4;
      border-color: #bce8d3;
      color: #116a46;
    }

    .global-banner[data-tone="error"] {
      background: #fff0ef;
      border-color: #efc2bd;
      color: var(--danger);
    }

    .results-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .results-summary {
      color: var(--muted);
      font-size: 14px;
    }

    .results-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 18px;
    }

    .empty-state {
      padding: 36px 20px;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      text-align: center;
      color: var(--muted);
      background: #fbfcfe;
    }

    .result-card {
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      gap: 18px;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: #fff;
    }

    .result-card[data-status="error"] {
      border-color: #efc2bd;
      background: #fff9f9;
    }

    .result-card[data-status="downloading"] {
      border-color: #b7d5ff;
      background: #f8fbff;
    }

    .result-thumb {
      position: relative;
      width: 100%;
      min-height: 124px;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      background: linear-gradient(135deg, #eef3fb 0%, #e4ebf5 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .result-thumb-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .result-thumb-placeholder {
      padding: 12px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
    }

    .result-body {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .result-header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .result-title {
      font-size: 20px;
      line-height: 1.3;
      word-break: break-word;
    }

    .result-badge {
      flex-shrink: 0;
      padding: 7px 10px;
      border-radius: 999px;
      background: #eef3fb;
      color: #33517a;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .result-url {
      color: var(--accent-strong);
      text-decoration: none;
      word-break: break-all;
    }

    .result-url:hover {
      text-decoration: underline;
    }

    .result-meta,
    .result-status {
      color: var(--muted);
      line-height: 1.45;
      word-break: break-word;
    }

    .result-error {
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #efc2bd;
      background: #fff2f0;
      color: var(--danger);
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .result-controls {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      padding: 16px;
      border-radius: 14px;
      background: var(--panel-muted);
    }

    .toggle-group {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
      padding-top: 26px;
    }

    .checkbox {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      color: var(--text);
    }

    .checkbox input {
      width: 16px;
      height: 16px;
      margin: 0;
    }

    .result-actions {
      display: flex;
      justify-content: flex-end;
    }

    .is-hidden {
      display: none !important;
    }

    @media (max-width: 900px) {
      .toolbar,
      .result-card,
      .result-controls {
        grid-template-columns: 1fr;
      }

      .toggle-group {
        padding-top: 0;
      }

      .result-actions {
        justify-content: stretch;
      }

      .download-button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="panel">
      <h1>Metadata Fetch Test</h1>
      <p class="subtitle">
        Paste one URL per line, fetch metadata over streaming POST-SSE, then download
        with optional FFmpeg conversion settings.
      </p>

      <div class="toolbar">
        <label class="field" for="urls-input">
          <span class="field-label">URLs</span>
          <textarea
            id="urls-input"
            spellcheck="false"
            placeholder="https://example.com/video-1&#10;https://example.com/video-2"
          ></textarea>
        </label>

        <div class="toggle-card">
          <span class="field-label">Full Fetch</span>
          <label class="toggle-row">
            <span class="switch">
              <input id="full-fetch-toggle" type="checkbox" aria-label="Enable full fetch">
              <span class="switch-track"></span>
              <span class="switch-thumb"></span>
            </span>
            <span>Use all available extractor clients</span>
          </label>
        </div>
      </div>

      <div class="secondary-toolbar">
        <label class="field" for="api-base-input">
          <span class="field-label">API Base</span>
          <input
            id="api-base-input"
            type="text"
            placeholder="http://127.0.0.1:8888"
            autocomplete="off"
            spellcheck="false"
          >
        </label>
      </div>

      <button id="fetch-button" class="fetch-button" type="button">Fetch</button>
      <div id="global-banner" class="global-banner" data-tone="info" role="status" aria-live="polite">
        Ready to fetch metadata.
      </div>
    </section>

    <section class="results-section">
      <div class="results-header">
        <h2>Options</h2>
        <div id="results-summary" class="results-summary">No fetch yet.</div>
      </div>
      <div id="results-list" class="results-list">
        <div class="empty-state">No results yet. Run Fetch to create option cards.</div>
      </div>
    </section>
  </main>

  <template id="result-card-template">
    <article class="result-card" data-status="waiting">
      <div class="result-thumb">
        <img class="result-thumb-image is-hidden" alt="">
        <div class="result-thumb-placeholder">No thumbnail</div>
      </div>

      <div class="result-body">
        <div class="result-header-row">
          <h3 class="result-title">Waiting for metadata...</h3>
          <span class="result-badge">Waiting</span>
        </div>

        <a class="result-url" href="" target="_blank" rel="noreferrer noopener"></a>
        <div class="result-meta"></div>
        <div class="result-status"></div>
        <div class="result-error is-hidden"></div>

        <div class="result-controls">
          <label class="control">
            <span class="field-label">Video format</span>
            <select class="js-video-format-select" disabled></select>
          </label>

          <label class="control">
            <span class="field-label">Audio format</span>
            <select class="js-audio-format-select" disabled></select>
          </label>

          <div class="toggle-group">
            <label class="checkbox">
              <input class="js-video-toggle" type="checkbox" checked disabled>
              <span>Video</span>
            </label>
            <label class="checkbox">
              <input class="js-audio-toggle" type="checkbox" checked disabled>
              <span>Audio</span>
            </label>
          </div>

          <label class="control">
            <span class="field-label">Video codec</span>
            <select class="js-vcodec-select" disabled></select>
          </label>

          <label class="control">
            <span class="field-label">Audio codec</span>
            <select class="js-acodec-select" disabled></select>
          </label>

          <label class="control">
            <span class="field-label">Container</span>
            <select class="js-container-select" disabled></select>
          </label>
        </div>

        <div class="result-actions">
          <button class="download-button js-download-button" type="button" disabled>Download</button>
        </div>
      </div>
    </article>
  </template>

  <script>
    (() => {
      "use strict";

      const CONTAINER_RULES = {
        mp4: {
          video: ["h264", "hevc", "av1", "vp9"],
          audio: ["aac", "mp3", "opus"]
        },
        webm: {
          video: ["vp9", "vp8"],
          audio: ["opus", "vorbis"]
        },
        mkv: {
          video: ["h264", "hevc", "av1", "vp9", "vp8"],
          audio: ["aac", "mp3", "opus", "vorbis"]
        }
      };

      const DOM = {
        urlsInput: document.getElementById("urls-input"),
        fullFetchToggle: document.getElementById("full-fetch-toggle"),
        apiBaseInput: document.getElementById("api-base-input"),
        fetchButton: document.getElementById("fetch-button"),
        globalBanner: document.getElementById("global-banner"),
        resultsSummary: document.getElementById("results-summary"),
        resultsList: document.getElementById("results-list"),
        cardTemplate: document.getElementById("result-card-template")
      };

      const state = {
        fetchState: "idle",
        currentRequestToken: 0,
        currentAbortController: null,
        cards: new Map(),
        total: 0,
        processed: 0,
        successCount: 0,
        errorCount: 0,
        apiBase: ""
      };

      DOM.fetchButton.addEventListener("click", handleFetchClick);
      DOM.apiBaseInput.addEventListener("change", handleApiBaseChange);
      window.addEventListener("beforeunload", () => {
        if (state.currentAbortController) {
          state.currentAbortController.abort();
        }
      });

      initializeApiBase();
      populateEmptyState();
      setGlobalBanner("Ready to fetch metadata.", "info");

      function handleFetchClick() {
        const urls = parseUrls(DOM.urlsInput.value);

        if (urls.length === 0) {
          setGlobalBanner("Enter at least one non-empty URL line before fetching.", "error");
          setResultsSummary("No valid URLs to fetch.");
          populateEmptyState();
          return;
        }

        if (state.currentAbortController) {
          state.currentAbortController.abort();
        }

        const requestToken = state.currentRequestToken + 1;
        const controller = new AbortController();

        state.currentRequestToken = requestToken;
        state.currentAbortController = controller;
        state.fetchState = "fetching";
        state.total = urls.length;
        state.processed = 0;
        state.successCount = 0;
        state.errorCount = 0;
        state.cards.clear();

        DOM.fetchButton.disabled = true;
        DOM.resultsList.innerHTML = "";

        urls.forEach((url, index) => {
          const card = createCardState(index, url);
          state.cards.set(index, card);
          DOM.resultsList.appendChild(card.elements.root);
          renderCard(card);
        });

        setGlobalBanner("Fetching metadata stream...", "info");
        setResultsSummary(buildProgressSummary());

        void fetchMetadataStream(requestToken, controller, urls, DOM.fullFetchToggle.checked);
      }

      async function fetchMetadataStream(requestToken, controller, urls, useAllClients) {
        try {
          const response = await fetch(buildApiUrl("/fetch/metadata/stream"), {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Accept": "text/event-stream"
            },
            body: JSON.stringify({
              urls,
              options: {
                use_all_clients: useAllClients
              }
            }),
            signal: controller.signal
          });

          if (!response.ok) {
            throw await buildResponseError(response, "Failed to fetch metadata");
          }

          if (!response.body) {
            throw new Error("Streaming response body is unavailable.");
          }

          await readSSEStream(response.body, (eventName, payload) => {
            handleSSEEvent(requestToken, eventName, payload);
          });

          if (requestToken === state.currentRequestToken && state.fetchState === "fetching") {
            state.fetchState = "idle";
            if (state.errorCount > 0) {
              setGlobalBanner("Metadata stream finished with some errors.", "error");
            } else {
              setGlobalBanner("Metadata stream finished.", "success");
            }
            setResultsSummary(buildProgressSummary());
          }
        } catch (error) {
          if (controller.signal.aborted) {
            return;
          }

          if (requestToken !== state.currentRequestToken) {
            return;
          }

          state.fetchState = "fatal";
          setGlobalBanner(error.message || "Metadata fetch failed.", "error");
          setResultsSummary(buildProgressSummary());
        } finally {
          if (requestToken === state.currentRequestToken) {
            DOM.fetchButton.disabled = false;
            state.currentAbortController = null;
          }
        }
      }

      function handleSSEEvent(requestToken, eventName, payload) {
        if (requestToken !== state.currentRequestToken) {
          return;
        }

        switch (eventName) {
          case "ready":
            if (typeof payload.total === "number") {
              state.total = payload.total;
            }
            setGlobalBanner("Metadata stream connected.", "info");
            setResultsSummary(buildProgressSummary());
            break;

          case "item":
            handleItemPayload(payload);
            break;

          case "error":
            handleItemErrorPayload(payload);
            break;

          case "fatal":
            state.fetchState = "fatal";
            setGlobalBanner(payload.error || "Fatal metadata stream error.", "error");
            setResultsSummary(buildProgressSummary());
            break;

          case "done":
            state.fetchState = "idle";
            if (state.errorCount > 0) {
              setGlobalBanner("Metadata fetch completed with some errors.", "error");
            } else {
              setGlobalBanner("Metadata fetch completed.", "success");
            }
            setResultsSummary(buildProgressSummary());
            break;

          default:
            setGlobalBanner("Unknown SSE event received: " + eventName, "error");
            setResultsSummary(buildProgressSummary());
            break;
        }
      }

      function handleItemPayload(payload) {
        const card = getOrCreateCard(payload.index, payload.url);
        card.metadata = payload.data && typeof payload.data === "object" ? payload.data : null;
        card.formats = Array.isArray(card.metadata && card.metadata.formats) ? card.metadata.formats.slice() : [];
        card.status = "ready";
        card.error = "";
        card.resolved = true;

        if (card.formats.length > 0) {
          const defaultVideoFormat = chooseDefaultVideoFormat(card.formats);
          const defaultAudioFormat = chooseDefaultAudioFormat(card.formats);
          card.selectedVideoFormatId = defaultVideoFormat ? defaultVideoFormat.format_id : "";
          card.selectedAudioFormatId = defaultAudioFormat ? defaultAudioFormat.format_id : "";
        } else {
          card.selectedVideoFormatId = "";
          card.selectedAudioFormatId = "";
        }

        card.container = "";
        card.selectedVCodec = "copy";
        card.selectedACodec = "copy";
        initializeStreamToggles(card);
        markProcessed(card, true);
        renderCard(card);
        if (state.errorCount > 0) {
          setGlobalBanner("Metadata stream is still running. Some URLs already failed.", "error");
        } else {
          setGlobalBanner("Metadata stream is still running...", "info");
        }
        setResultsSummary(buildProgressSummary());
      }

      function handleItemErrorPayload(payload) {
        const card = getOrCreateCard(payload.index, payload.url);
        card.status = "error";
        card.error = payload.error || "Failed to fetch metadata for this URL.";
        card.metadata = null;
        card.formats = [];
        card.selectedVideoFormatId = "";
        card.selectedAudioFormatId = "";
        card.resolved = true;

        markProcessed(card, false);
        renderCard(card);
        setGlobalBanner("Some URLs failed. See card errors below.", "error");
        setResultsSummary(buildProgressSummary());
      }

      function getOrCreateCard(index, url) {
        const normalizedIndex = Number.isInteger(index) ? index : state.cards.size;

        if (state.cards.has(normalizedIndex)) {
          return state.cards.get(normalizedIndex);
        }

        const card = createCardState(normalizedIndex, url || "");
        state.cards.set(normalizedIndex, card);
        DOM.resultsList.appendChild(card.elements.root);
        renderCard(card);
        return card;
      }

      function createCardState(index, url) {
        const fragment = DOM.cardTemplate.content.cloneNode(true);
        const root = fragment.querySelector(".result-card");
        const elements = {
          root,
          thumbImage: fragment.querySelector(".result-thumb-image"),
          thumbPlaceholder: fragment.querySelector(".result-thumb-placeholder"),
          title: fragment.querySelector(".result-title"),
          badge: fragment.querySelector(".result-badge"),
          urlLink: fragment.querySelector(".result-url"),
          meta: fragment.querySelector(".result-meta"),
          status: fragment.querySelector(".result-status"),
          error: fragment.querySelector(".result-error"),
          videoFormatSelect: fragment.querySelector(".js-video-format-select"),
          audioFormatSelect: fragment.querySelector(".js-audio-format-select"),
          videoToggle: fragment.querySelector(".js-video-toggle"),
          audioToggle: fragment.querySelector(".js-audio-toggle"),
          vcodecSelect: fragment.querySelector(".js-vcodec-select"),
          acodecSelect: fragment.querySelector(".js-acodec-select"),
          containerSelect: fragment.querySelector(".js-container-select"),
          downloadButton: fragment.querySelector(".js-download-button")
        };

        const card = {
          index,
          requestUrl: url || "",
          metadata: null,
          formats: [],
          selectedVideoFormatId: "",
          selectedAudioFormatId: "",
          videoEnabled: true,
          audioEnabled: true,
          container: "",
          selectedVCodec: "copy",
          selectedACodec: "copy",
          status: "waiting",
          error: "",
          resolved: false,
          elements
        };

        elements.urlLink.textContent = url || "No URL";
        elements.urlLink.href = url || "#";

        populateContainerSelect(card);
        populateCodecSelect(elements.vcodecSelect, [], "copy");
        populateCodecSelect(elements.acodecSelect, [], "copy");
        populateVideoFormatSelect(card);
        populateAudioFormatSelect(card);

        elements.videoFormatSelect.addEventListener("change", (event) => {
          card.selectedVideoFormatId = event.target.value;
          ensureCardSelections(card);
          renderCard(card);
        });

        elements.audioFormatSelect.addEventListener("change", (event) => {
          card.selectedAudioFormatId = event.target.value;
          ensureCardSelections(card);
          renderCard(card);
        });

        elements.videoToggle.addEventListener("change", (event) => {
          card.videoEnabled = Boolean(event.target.checked);
          renderCard(card);
        });

        elements.audioToggle.addEventListener("change", (event) => {
          card.audioEnabled = Boolean(event.target.checked);
          renderCard(card);
        });

        elements.containerSelect.addEventListener("change", (event) => {
          card.container = event.target.value;
          ensureCardSelections(card);
          renderCard(card);
        });

        elements.vcodecSelect.addEventListener("change", (event) => {
          card.selectedVCodec = event.target.value || "copy";
          renderCard(card);
        });

        elements.acodecSelect.addEventListener("change", (event) => {
          card.selectedACodec = event.target.value || "copy";
          renderCard(card);
        });

        elements.downloadButton.addEventListener("click", () => {
          void handleDownload(card);
        });

        return card;
      }

      function renderCard(card) {
        ensureCardSelections(card);

        const selectedVideoFormat = getSelectedVideoFormat(card);
        const selectedAudioFormat = getSelectedAudioFormat(card);
        const hasSelectableVideo = getVideoFormats(card.formats).length > 0;
        const hasSelectableAudio = getAudioFormats(card.formats).length > 0;
        const elements = card.elements;

        elements.root.dataset.status = card.status;
        elements.badge.textContent = getBadgeLabel(card.status);
        elements.title.textContent = buildCardTitle(card);
        elements.urlLink.textContent = card.metadata && card.metadata.original_url ? card.metadata.original_url : card.requestUrl || "No URL";
        elements.urlLink.href = elements.urlLink.textContent || "#";

        populateVideoFormatSelect(card);
        populateAudioFormatSelect(card);
        populateContainerSelect(card);
        populateCodecSelect(elements.vcodecSelect, getAllowedCodecs(card.container, "video"), card.selectedVCodec);
        populateCodecSelect(elements.acodecSelect, getAllowedCodecs(card.container, "audio"), card.selectedACodec);

        const canUseControls = Boolean(card.metadata);
        const hasFormats = card.formats.length > 0;
        const downloading = card.status === "downloading";

        elements.videoFormatSelect.disabled = !canUseControls || !hasSelectableVideo || downloading || !card.videoEnabled;
        elements.audioFormatSelect.disabled = !canUseControls || !hasSelectableAudio || downloading || !card.audioEnabled;
        elements.containerSelect.disabled = !canUseControls || downloading;
        elements.vcodecSelect.disabled = !card.container || !canUseControls || !selectedVideoFormat || !card.videoEnabled || downloading;
        elements.acodecSelect.disabled = !card.container || !canUseControls || !selectedAudioFormat || !card.audioEnabled || downloading;
        elements.videoToggle.disabled = !canUseControls || !hasSelectableVideo || downloading;
        elements.audioToggle.disabled = !canUseControls || !hasSelectableAudio || downloading;

        elements.videoToggle.checked = Boolean(card.videoEnabled);
        elements.audioToggle.checked = Boolean(card.audioEnabled);
        elements.containerSelect.value = card.container;
        elements.vcodecSelect.value = card.selectedVCodec;
        elements.acodecSelect.value = card.selectedACodec;

        renderThumbnail(card);
        renderMeta(card);
        renderStatusLine(card);
        renderError(card);
        renderDownloadButton(card);
      }

      function renderThumbnail(card) {
        const elements = card.elements;
        const thumbnail = card.metadata && typeof card.metadata.thumbnail === "string" ? card.metadata.thumbnail.trim() : "";

        if (thumbnail) {
          elements.thumbImage.src = thumbnail;
          elements.thumbImage.alt = buildCardTitle(card) + " thumbnail";
          elements.thumbImage.classList.remove("is-hidden");
          elements.thumbPlaceholder.classList.add("is-hidden");
        } else {
          elements.thumbImage.removeAttribute("src");
          elements.thumbImage.alt = "";
          elements.thumbImage.classList.add("is-hidden");
          elements.thumbPlaceholder.classList.remove("is-hidden");
        }
      }

      function renderMeta(card) {
        const pieces = [];

        if (card.metadata) {
          if (card.metadata.media_type) {
            pieces.push("Type: " + String(card.metadata.media_type));
          }

          if (Number.isFinite(card.metadata.duration) && card.metadata.duration > 0) {
            pieces.push("Duration: " + formatDuration(card.metadata.duration));
          }

          if (card.formats.length > 0) {
            pieces.push("Formats: " + String(card.formats.length));
          } else {
            pieces.push("Formats: none");
          }
        } else {
          pieces.push("Waiting for metadata.");
        }

        card.elements.meta.textContent = pieces.join(" | ");
      }

      function renderStatusLine(card) {
        const selectedVideoFormat = getSelectedVideoFormat(card);
        const selectedAudioFormat = getSelectedAudioFormat(card);
        const notices = [];

        notices.push(getStatusText(card.status));

        if (!card.metadata && card.status === "waiting") {
          notices.push("Card is queued.");
        }

        if (card.metadata && card.formats.length === 0) {
          notices.push("No formats were returned for this item.");
        }

        if (card.videoEnabled && !selectedVideoFormat) {
          notices.push("Choose a video format.");
        }

        if (card.audioEnabled && !selectedAudioFormat) {
          notices.push("Choose an audio format.");
        }

        if (
          (selectedVideoFormat || selectedAudioFormat) &&
          !card.container &&
          ((!card.videoEnabled && selectedVideoFormat) || (!card.audioEnabled && selectedAudioFormat))
        ) {
          notices.push("Choose a container if you want FFmpeg to enforce stream removal.");
        }

        if (!card.videoEnabled && !card.audioEnabled) {
          notices.push("Enable at least one stream to download.");
        }

        card.elements.status.textContent = notices.join(" ");
      }

      function renderError(card) {
        if (card.error) {
          card.elements.error.textContent = card.error;
          card.elements.error.classList.remove("is-hidden");
        } else {
          card.elements.error.textContent = "";
          card.elements.error.classList.add("is-hidden");
        }
      }

      function renderDownloadButton(card) {
        const hasFormats = card.formats.length > 0;
        const isDownloading = card.status === "downloading";
        const disabled = !hasFormats || isDownloading || Boolean(validateBeforeDownload(card));

        card.elements.downloadButton.disabled = disabled;
        card.elements.downloadButton.textContent = isDownloading ? "Downloading..." : "Download";
      }

      function initializeStreamToggles(card) {
        card.videoEnabled = getVideoFormats(card.formats).length > 0;
        card.audioEnabled = getAudioFormats(card.formats).length > 0;
      }

      function ensureCardSelections(card) {
        if (!card.formats.length) {
          card.selectedVideoFormatId = "";
          card.selectedAudioFormatId = "";
          card.container = "";
          card.selectedVCodec = "copy";
          card.selectedACodec = "copy";
          card.videoEnabled = true;
          card.audioEnabled = true;
          return;
        }

        const videoFormats = getVideoFormats(card.formats);
        const audioFormats = getAudioFormats(card.formats);

        if (videoFormats.length === 0) {
          card.videoEnabled = false;
          card.selectedVideoFormatId = "";
        } else if (
          !card.selectedVideoFormatId ||
          !videoFormats.some((format) => format.format_id === card.selectedVideoFormatId)
        ) {
          const defaultVideoFormat = chooseDefaultVideoFormat(card.formats);
          card.selectedVideoFormatId = defaultVideoFormat ? defaultVideoFormat.format_id : videoFormats[0].format_id;
        }

        if (audioFormats.length === 0) {
          card.audioEnabled = false;
          card.selectedAudioFormatId = "";
        } else if (
          !card.selectedAudioFormatId ||
          !audioFormats.some((format) => format.format_id === card.selectedAudioFormatId)
        ) {
          const defaultAudioFormat = chooseDefaultAudioFormat(card.formats);
          card.selectedAudioFormatId = defaultAudioFormat ? defaultAudioFormat.format_id : audioFormats[0].format_id;
        }

        if (!card.container) {
          card.selectedVCodec = "copy";
          card.selectedACodec = "copy";
          return;
        }

        if (!(card.container in CONTAINER_RULES)) {
          card.container = "";
          card.selectedVCodec = "copy";
          card.selectedACodec = "copy";
          return;
        }

        const allowedVideo = getAllowedCodecs(card.container, "video");
        const allowedAudio = getAllowedCodecs(card.container, "audio");

        if (!allowedVideo.includes(card.selectedVCodec)) {
          card.selectedVCodec = "copy";
        }

        if (!allowedAudio.includes(card.selectedACodec)) {
          card.selectedACodec = "copy";
        }
      }

      function populateVideoFormatSelect(card) {
        const select = card.elements.videoFormatSelect;
        const previousValue = card.selectedVideoFormatId;
        const formats = getVideoFormats(card.formats);

        select.innerHTML = "";

        if (formats.length === 0) {
          select.appendChild(createOption("", "No video formats available"));
          select.value = "";
          return;
        }

        formats.forEach((format) => {
          select.appendChild(createOption(format.format_id, buildFormatLabel(format)));
        });

        if (previousValue && formats.some((format) => format.format_id === previousValue)) {
          select.value = previousValue;
        } else {
          select.value = formats[0].format_id;
          card.selectedVideoFormatId = select.value;
        }
      }

      function populateAudioFormatSelect(card) {
        const select = card.elements.audioFormatSelect;
        const previousValue = card.selectedAudioFormatId;
        const formats = getAudioFormats(card.formats);

        select.innerHTML = "";

        if (formats.length === 0) {
          select.appendChild(createOption("", "No audio formats available"));
          select.value = "";
          return;
        }

        formats.forEach((format) => {
          select.appendChild(createOption(format.format_id, buildFormatLabel(format)));
        });

        if (previousValue && formats.some((format) => format.format_id === previousValue)) {
          select.value = previousValue;
        } else {
          select.value = formats[0].format_id;
          card.selectedAudioFormatId = select.value;
        }
      }

      function populateContainerSelect(card) {
        const select = card.elements.containerSelect;
        const previousValue = card.container;

        select.innerHTML = "";
        select.appendChild(createOption("", "Keep original / no convert"));
        Object.keys(CONTAINER_RULES).forEach((container) => {
          select.appendChild(createOption(container, container.toUpperCase()));
        });

        select.value = previousValue in CONTAINER_RULES || previousValue === "" ? previousValue : "";
      }

      function populateCodecSelect(select, codecs, selectedValue) {
        const values = Array.isArray(codecs) ? codecs : [];
        select.innerHTML = "";
        select.appendChild(createOption("copy", "Copy"));
        values.forEach((codec) => {
          select.appendChild(createOption(codec, codec));
        });

        if (selectedValue && Array.from(select.options).some((option) => option.value === selectedValue)) {
          select.value = selectedValue;
        } else {
          select.value = "copy";
        }
      }

      async function handleDownload(card) {
        const validationError = validateBeforeDownload(card);

        if (validationError) {
          card.error = validationError;
          renderCard(card);
          return;
        }

        const payload = buildDownloadPayload(card);
        const previousStatus = card.status;
        card.status = "downloading";
        card.error = "";
        renderCard(card);

        try {
          const response = await fetch(buildApiUrl("/download"), {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Accept": "application/octet-stream"
            },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            throw await buildResponseError(response, "Download failed");
          }

          const blob = await response.blob();
          const filename = parseFilenameFromContentDisposition(response.headers.get("Content-Disposition")) || "download.bin";
          triggerBlobDownload(blob, filename);
          card.status = "ready";
          card.error = "";
          renderCard(card);
        } catch (error) {
          card.status = previousStatus === "waiting" ? "waiting" : "ready";
          card.error = error.message || "Download failed.";
          renderCard(card);
        }
      }

      function validateBeforeDownload(card) {
        if (!card.metadata) {
          return "Metadata is not available yet for this card.";
        }

        if (!card.videoEnabled && !card.audioEnabled) {
          return "At least one stream must stay enabled.";
        }

        if ((!card.videoEnabled || !card.audioEnabled) && !card.container) {
          return "Choose a container if you want to disable one of the streams.";
        }

        if (card.videoEnabled && !card.selectedVideoFormatId) {
          return "Choose a video format before downloading.";
        }

        if (card.audioEnabled && !card.selectedAudioFormatId) {
          return "Choose an audio format before downloading.";
        }

        return "";
      }

      function buildDownloadPayload(card) {
        const formatIds = [];
        const selectedVideoFormat = getSelectedVideoFormat(card);
        const selectedAudioFormat = getSelectedAudioFormat(card);

        if (card.videoEnabled && selectedVideoFormat) {
          formatIds.push(selectedVideoFormat.format_id);
        }

        if (card.audioEnabled && selectedAudioFormat) {
          formatIds.push(selectedAudioFormat.format_id);
        }

        const uniqueFormatIds = [];
        formatIds.forEach((formatId) => {
          if (!uniqueFormatIds.includes(formatId)) {
            uniqueFormatIds.push(formatId);
          }
        });

        const payload = {
          url: card.metadata && card.metadata.original_url ? card.metadata.original_url : card.requestUrl,
          options: {
            format_id: uniqueFormatIds.join("+"),
            vcodec: "",
            acodec: "",
            container: card.container || ""
          }
        };

        if (!card.container) {
          return payload;
        }

        if (card.videoEnabled && selectedVideoFormat) {
          payload.options.vcodec = card.videoEnabled ? (card.selectedVCodec === "copy" ? "" : card.selectedVCodec) : "none";
        } else if (card.container) {
          payload.options.vcodec = "none";
        }

        if (card.audioEnabled && selectedAudioFormat) {
          payload.options.acodec = card.audioEnabled ? (card.selectedACodec === "copy" ? "" : card.selectedACodec) : "none";
        } else if (card.container) {
          payload.options.acodec = "none";
        }

        return payload;
      }

      async function readSSEStream(stream, onEvent) {
        const reader = stream.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const result = await reader.read();

          if (result.value) {
            buffer += decoder.decode(result.value, { stream: true });
            buffer = buffer.replace(/\r/g, "");

            let separatorIndex = buffer.indexOf("\n\n");
            while (separatorIndex !== -1) {
              const rawEvent = buffer.slice(0, separatorIndex);
              buffer = buffer.slice(separatorIndex + 2);

              if (rawEvent.trim() !== "") {
                const parsed = parseSSEEvent(rawEvent);
                onEvent(parsed.event, parsed.payload);
              }

              separatorIndex = buffer.indexOf("\n\n");
            }
          }

          if (result.done) {
            buffer += decoder.decode();
            break;
          }
        }

        const tail = buffer.trim();
        if (tail !== "") {
          const parsed = parseSSEEvent(tail);
          onEvent(parsed.event, parsed.payload);
        }
      }

      function parseSSEEvent(rawEvent) {
        const lines = rawEvent.split("\n");
        let eventName = "message";
        const dataLines = [];

        lines.forEach((line) => {
          if (!line || line.startsWith(":")) {
            return;
          }

          if (line.startsWith("event:")) {
            eventName = line.slice(6).trim();
            return;
          }

          if (line.startsWith("data:")) {
            dataLines.push(line.slice(5).trimStart());
          }
        });

        const payloadText = dataLines.join("\n");
        let payload = {};

        if (payloadText) {
          try {
            payload = JSON.parse(payloadText);
          } catch (error) {
            throw new Error("Invalid SSE payload JSON: " + error.message);
          }
        }

        return {
          event: eventName,
          payload
        };
      }

      async function buildResponseError(response, prefix) {
        const contentType = response.headers.get("Content-Type") || "";
        let detail = "";

        try {
          if (contentType.includes("application/json")) {
            const payload = await response.json();
            detail = payload && typeof payload.error === "string" ? payload.error : JSON.stringify(payload);
          } else {
            detail = (await response.text()).trim();
          }
        } catch (error) {
          detail = "";
        }

        if (!detail) {
          detail = "HTTP " + response.status;
        }

        return new Error(prefix + ": " + detail);
      }

      function parseUrls(text) {
        return String(text || "")
          .split(/\n/)
          .map((line) => line.trim())
          .filter((line) => line.length > 0);
      }

      function initializeApiBase() {
        const savedValue = window.localStorage.getItem("nodus:test:api-base") || "";
        const defaultValue = window.location.protocol === "file:" ? "http://127.0.0.1:8888" : "";
        state.apiBase = normalizeApiBase(savedValue || defaultValue);
        DOM.apiBaseInput.value = state.apiBase;
      }

      function handleApiBaseChange() {
        state.apiBase = normalizeApiBase(DOM.apiBaseInput.value);
        DOM.apiBaseInput.value = state.apiBase;
        window.localStorage.setItem("nodus:test:api-base", state.apiBase);
      }

      function normalizeApiBase(value) {
        const trimmed = String(value || "").trim();
        if (!trimmed) {
          return "";
        }

        return trimmed.replace(/\/+$/, "");
      }

      function buildApiUrl(pathname) {
        const path = pathname.startsWith("/") ? pathname : "/" + pathname;
        const base = normalizeApiBase(state.apiBase);

        if (base) {
          return base + path;
        }

        if (window.location.protocol === "file:") {
          return "http://127.0.0.1:8888" + path;
        }

        return path;
      }

      function buildCardTitle(card) {
        if (card.metadata && typeof card.metadata.title === "string" && card.metadata.title.trim()) {
          return card.metadata.title.trim();
        }

        if (card.requestUrl) {
          return "URL #" + (card.index + 1);
        }

        return "Untitled item";
      }

      function getStatusText(status) {
        switch (status) {
          case "waiting":
            return "Waiting.";
          case "ready":
            return "Ready.";
          case "error":
            return "Error.";
          case "downloading":
            return "Downloading.";
          default:
            return "Idle.";
        }
      }

      function getBadgeLabel(status) {
        switch (status) {
          case "waiting":
            return "Waiting";
          case "ready":
            return "Ready";
          case "error":
            return "Error";
          case "downloading":
            return "Downloading";
          default:
            return "Idle";
        }
      }

      function chooseDefaultVideoFormat(formats) {
        const list = Array.isArray(formats) ? formats : [];
        const videoFormats = list.filter((format) => hasVideoStream(format));
        if (videoFormats.length === 0) {
          return null;
        }

        const combined = videoFormats.find((format) => hasAudioStream(format));
        if (combined) {
          return combined;
        }

        return videoFormats[0];
      }

      function chooseDefaultAudioFormat(formats) {
        const list = Array.isArray(formats) ? formats : [];
        const audioFormats = list.filter((format) => hasAudioStream(format));
        if (audioFormats.length === 0) {
          return null;
        }

        const combined = audioFormats.find((format) => hasVideoStream(format));
        if (combined) {
          return combined;
        }

        return audioFormats[0];
      }

      function getSelectedVideoFormat(card) {
        if (!card.selectedVideoFormatId || !card.formats.length) {
          return null;
        }

        return card.formats.find((format) => format.format_id === card.selectedVideoFormatId) || null;
      }

      function getSelectedAudioFormat(card) {
        if (!card.selectedAudioFormatId || !card.formats.length) {
          return null;
        }

        return card.formats.find((format) => format.format_id === card.selectedAudioFormatId) || null;
      }

      function getVideoFormats(formats) {
        return (Array.isArray(formats) ? formats : []).filter((format) => hasVideoStream(format));
      }

      function getAudioFormats(formats) {
        return (Array.isArray(formats) ? formats : []).filter((format) => hasAudioStream(format));
      }

      function hasVideoStream(format) {
        const value = normalizeString(format && format.vcodec);
        return value !== "" && value !== "none";
      }

      function hasAudioStream(format) {
        const value = normalizeString(format && format.acodec);
        return value !== "" && value !== "none";
      }

      function normalizeString(value) {
        return String(value || "").trim().toLowerCase();
      }

      function getAllowedCodecs(container, streamType) {
        if (!container || !(container in CONTAINER_RULES)) {
          return [];
        }

        return CONTAINER_RULES[container][streamType].slice();
      }

      function buildFormatLabel(format) {
        const parts = [];

        if (format.format_id) {
          parts.push(format.format_id);
        }

        if (format.format_note) {
          parts.push(format.format_note);
        } else if (format.resolution) {
          parts.push(format.resolution);
        } else if (format.width && format.height) {
          parts.push(format.width + "x" + format.height);
        }

        const codecParts = [];
        if (format.vcodec) {
          codecParts.push("v:" + format.vcodec);
        }
        if (format.acodec) {
          codecParts.push("a:" + format.acodec);
        }
        if (codecParts.length > 0) {
          parts.push(codecParts.join(" "));
        }

        if (format.container || format.ext) {
          parts.push("out:" + [format.container, format.ext].filter(Boolean).join("/"));
        }

        const size = Number.isFinite(format.filesize) && format.filesize > 0
          ? format.filesize
          : Number.isFinite(format.filesize_approx) && format.filesize_approx > 0
            ? format.filesize_approx
            : 0;

        if (size > 0) {
          parts.push(formatBytes(size));
        }

        return parts.join(" | ");
      }

      function formatBytes(bytes) {
        if (!Number.isFinite(bytes) || bytes <= 0) {
          return "";
        }

        const units = ["B", "KB", "MB", "GB", "TB"];
        let size = bytes;
        let unitIndex = 0;

        while (size >= 1024 && unitIndex < units.length - 1) {
          size /= 1024;
          unitIndex += 1;
        }

        const precision = size >= 10 || unitIndex === 0 ? 0 : 1;
        return size.toFixed(precision) + " " + units[unitIndex];
      }

      function formatDuration(totalSeconds) {
        const seconds = Math.max(0, Number(totalSeconds) || 0);
        const hours = Math.floor(seconds / 3600);
        const minutes = Math.floor((seconds % 3600) / 60);
        const secs = Math.floor(seconds % 60);

        const parts = [
          String(minutes).padStart(hours > 0 ? 2 : 1, "0"),
          String(secs).padStart(2, "0")
        ];

        if (hours > 0) {
          parts.unshift(String(hours));
        }

        return parts.join(":");
      }

      function parseFilenameFromContentDisposition(headerValue) {
        if (!headerValue) {
          return "";
        }

        const filenameStarMatch = headerValue.match(/filename\*\s*=\s*UTF-8''([^;]+)/i);
        if (filenameStarMatch && filenameStarMatch[1]) {
          return decodeURIComponent(filenameStarMatch[1]).replace(/[\\/:*?"<>|]/g, "_");
        }

        const filenameMatch = headerValue.match(/filename\s*=\s*"([^"]+)"|filename\s*=\s*([^;]+)/i);
        const rawValue = filenameMatch ? (filenameMatch[1] || filenameMatch[2] || "") : "";
        return rawValue.trim().replace(/^"+|"+$/g, "").replace(/[\\/:*?"<>|]/g, "_");
      }

      function triggerBlobDownload(blob, filename) {
        const blobUrl = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = blobUrl;
        anchor.download = filename || "download.bin";
        anchor.style.display = "none";
        document.body.appendChild(anchor);
        anchor.click();

        window.setTimeout(() => {
          URL.revokeObjectURL(blobUrl);
          anchor.remove();
        }, 1000);
      }

      function createOption(value, label) {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = label;
        return option;
      }

      function setGlobalBanner(message, tone) {
        DOM.globalBanner.textContent = message;
        DOM.globalBanner.dataset.tone = tone || "info";
      }

      function setResultsSummary(message) {
        DOM.resultsSummary.textContent = message;
      }

      function buildProgressSummary() {
        if (state.total === 0) {
          return "No fetch yet.";
        }

        return [
          state.processed + "/" + state.total + " resolved",
          state.successCount + " ready",
          state.errorCount + " failed"
        ].join(" | ");
      }

      function markProcessed(card, succeeded) {
        if (!card._counted) {
          state.processed += 1;
          card._counted = true;
        }

        if (succeeded) {
          if (!card._countedSuccess) {
            state.successCount += 1;
            card._countedSuccess = true;
          }
        } else if (!card._countedError) {
          state.errorCount += 1;
          card._countedError = true;
        }
      }

      function populateEmptyState() {
        DOM.resultsList.innerHTML = "";
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = "No results yet. Run Fetch to create option cards.";
        DOM.resultsList.appendChild(empty);
      }
    })();
  </script>
</body>
</html>
